# One-command local stack: DocuMind OCR API + Ollama (model pre-baked).
#
#   docker compose up --build
#   curl -F "file=@invoice.pdf" http://localhost:8000/extract
#
services:
  ollama:
    build: ./ollama          # Dockerfile bakes llama3.2:latest in at build time
    image: documind-ollama
    container_name: documind-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: "-1"   # keep the model resident — no cold starts
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

  ocr:
    build: ./ocr
    image: documind-ocr
    container_name: documind-ocr
    ports:
      - "8000:8000"
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      MODEL_NAME: "llama3.2:latest"
      NUM_CTX: "4096"
      OLLAMA_KEEP_ALIVE: "-1"
      MAX_INVOICE_PDF_PAGES: "15"
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/status').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  ollama-models:
